<!DOCTYPE html>
<html>
<head>
<title>AI App Builder</title>
<style>
  body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
  .panel { width: 35%; padding: 20px; box-sizing: border-box; }
  textarea { width: 100%; height: 120px; }
  button { margin-top: 10px; padding: 10px 20px; cursor: pointer; }
  iframe { width: 65%; height: 100vh; border: none; border-left: 1px solid #ccc; }
  #status { color: gray; margin-top: 10px; }
</style>
</head>
<body>
  <div class="panel">
    <h2>Describe your app</h2>
    <textarea id="prompt" placeholder="e.g. a todo list app"></textarea>
    <br>
    <button onclick="generateApp()">Generate</button>
    <div id="status"></div>
  </div>
  <iframe id="preview"></iframe>

<script>
async function generateApp() {
  const prompt = document.getElementById('prompt').value;
  const status = document.getElementById('status');
  status.textContent = "Generating...";

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt})
    });

    if (!res.ok) {
      const err = await res.json();
      status.textContent = "Error: " + err.detail;
      return;
    }

    const data = await res.json();
    document.getElementById('preview').srcdoc = data.code;
    status.textContent = "Done!";
  } catch (e) {
    status.textContent = "Something went wrong. Try again.";
  }
}
</script>
</body>
</html>
